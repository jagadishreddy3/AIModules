<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Automation Hub | GenTools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0f172a',
                        darkcard: '#1e293b',
                        darkborder: '#334155'
                    }
                }
            }
        }
    </script>
    <style>
        .modal { display: none; }
        .modal.active { display: flex; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .light ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkbg text-slate-900 dark:text-slate-100 h-screen flex transition-colors duration-300 overflow-hidden font-sans">

    <aside class="w-72 bg-white dark:bg-darkcard border-r border-slate-200 dark:border-darkborder flex flex-col shrink-0">
        <div class="p-6 border-b border-slate-200 dark:border-darkborder flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <i data-lucide="terminal" class="w-5 h-5"></i>
            </div>
            <span class="text-xl font-bold tracking-tight">GenTools <span class="text-blue-500">AI</span></span>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <p class="px-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Modules</p>
            <button class="w-full flex items-center gap-3 p-3 bg-blue-600/10 text-blue-600 dark:text-blue-400 rounded-xl border border-blue-600/20 text-sm font-semibold">
                <i data-lucide="file-text" class="w-4 h-4"></i> Test Plan Generator
            </button>
            <button class="w-full flex items-center gap-3 p-3 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl text-slate-500 dark:text-slate-400 text-sm transition-all group">
                <i data-lucide="code-2" class="w-4 h-4 group-hover:text-blue-500"></i> BDD Feature Gen
            </button>
        </nav>

        <div class="p-4 border-t border-slate-200 dark:border-darkborder">
            <div class="bg-slate-50 dark:bg-slate-800/50 p-3 rounded-xl flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-white text-xs font-bold">JR</div>
                <div class="flex-1 min-w-0 text-left">
                    <p class="text-xs font-bold truncate">Jagadishwar Reddy</p>
                    <p class="text-[10px] text-slate-500 truncate">Senior QA Engineer</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        
        <header class="h-16 bg-white dark:bg-darkcard border-b border-slate-200 dark:border-darkborder flex items-center justify-between px-8 z-10">
            <div class="flex items-center gap-2">
                <span class="text-slate-400 text-sm">Dashboard /</span>
                <span class="text-sm font-semibold">Test Plan Generator</span>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-2.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors text-slate-500">
                    <i data-lucide="sun" id="sunIcon" class="w-5 h-5 hidden"></i>
                    <i data-lucide="moon" id="moonIcon" class="w-5 h-5"></i>
                </button>
                <button onclick="toggleModal('settingsModal')" class="p-2.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors text-slate-500">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <div class="p-8 flex-1 flex flex-col gap-6 overflow-hidden">
            
            <div class="grid grid-cols-2 gap-8 flex-1 min-h-0">
                
                <div class="flex flex-col gap-4 min-h-0">
                    <div class="flex flex-col flex-1 min-h-0 gap-4">
                        
                        <div>
                            <label class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3 block">Requirement Source</label>
                            <div class="flex gap-4">
                                <label class="flex-1 cursor-pointer">
                                    <input type="radio" name="source" value="text" class="hidden peer" checked onclick="toggleSourceFields('text')">
                                    <div class="p-3 text-center border-2 rounded-xl dark:border-darkborder peer-checked:border-blue-500 peer-checked:bg-blue-50 dark:peer-checked:bg-blue-900/20 text-xs font-bold transition-all">
                                        Manual Requirements (Raw Text)
                                    </div>
                                </label>
                                <label class="flex-1 cursor-pointer">
                                    <input type="radio" name="source" value="jira" class="hidden peer" onclick="toggleSourceFields('jira')">
                                    <div class="p-3 text-center border-2 rounded-xl dark:border-darkborder peer-checked:border-blue-500 peer-checked:bg-blue-50 dark:peer-checked:bg-blue-900/20 text-xs font-bold transition-all">
                                        Jira Ticket Context (Hybrid)
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div id="jiraInputField" class="hidden animate-in fade-in slide-in-from-top-2 duration-300">
                            <label class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 flex items-center justify-between">
                                Jira Issue Key / URL
                                <span id="jiraFetchStatus" class="hidden text-[10px] text-blue-500 animate-pulse">Fetching Issue...</span>
                            </label>
                            <div class="relative">
                                <input type="text" id="jiraKey" onblur="simulateJiraFetch()" class="w-full p-3 pl-10 border border-slate-200 dark:border-darkborder dark:bg-slate-800 rounded-xl shadow-sm text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., QA-123 or Browse Issue Link">
                                <i data-lucide="link" class="w-4 h-4 absolute left-3.5 top-3.5 text-slate-400"></i>
                            </div>
                        </div>

                        <div class="flex-1 flex flex-col min-h-0 gap-2">
                            <label id="textAreaLabel" class="text-xs font-bold uppercase tracking-wider text-slate-400">Requirements Details</label>
                            <textarea id="inputText" class="flex-1 p-5 border border-slate-200 dark:border-darkborder dark:bg-slate-800/50 rounded-2xl shadow-sm text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none transition-all leading-relaxed" placeholder="Type or paste manual user stories here..."></textarea>
                        </div>
                    </div>

                    <div class="h-28 flex flex-col gap-2">
                        <label class="text-xs font-bold uppercase tracking-wider text-slate-400">Context Attachments</label>
                        <div class="flex-1 border-2 border-dashed border-slate-200 dark:border-darkborder rounded-2xl flex flex-col items-center justify-center hover:border-blue-500 hover:bg-blue-50/50 dark:hover:bg-blue-900/10 transition-all cursor-pointer group relative">
                            <input type="file" id="fileInput" class="absolute inset-0 opacity-0 cursor-pointer" multiple onchange="updateFileCount()">
                            <i data-lucide="paperclip" class="w-5 h-5 text-slate-300 group-hover:text-blue-500 mb-1"></i>
                            <p class="text-xs text-slate-400" id="fileStatus">Drop screenshots/logs here</p>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-2 min-h-0">
                    <label id="outputLabel" class="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center justify-between">
                        Generated Output
                        <div id="genStatus" class="hidden flex items-center gap-2 text-[10px] text-blue-500 font-bold animate-pulse">
                            <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> AI PROCESSING
                        </div>
                    </label>
                    <div id="outputContainer" class="flex-1 bg-white dark:bg-slate-800/30 border border-slate-200 dark:border-darkborder rounded-2xl p-6 text-sm overflow-y-auto whitespace-pre-wrap shadow-inner relative">
                        <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 space-y-2">
                            <i data-lucide="sparkles" class="w-8 h-8 opacity-20"></i>
                            <p class="italic">Ready for generation...</p>
                        </div>
                        <div id="actualContent" class="relative z-10 text-slate-700 dark:text-slate-300 leading-7"></div>
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center bg-white dark:bg-darkcard p-4 rounded-2xl border border-slate-200 dark:border-darkborder shadow-sm">
                <div class="flex items-center gap-4 text-[10px] font-bold uppercase tracking-tighter text-slate-400">
                    <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-green-500"></div> LLM ACTIVE</div>
                    <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-green-500"></div> JIRA LINKED</div>
                </div>
                <div class="flex gap-3">
                    <button onclick="generate()" class="px-10 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-500/20 active:scale-95 transition-all flex items-center gap-2">
                        <i data-lucide="wand-2" class="w-4 h-4"></i> Generate
                    </button>
                    <button onclick="download()" class="px-6 py-3 border border-slate-200 dark:border-darkborder rounded-xl font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all flex items-center gap-2">
                        <i data-lucide="download" class="w-4 h-4 text-slate-400"></i> Download
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="settingsModal" class="modal fixed inset-0 bg-slate-900/80 backdrop-blur-md items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-darkcard rounded-3xl p-8 w-full max-w-xl shadow-2xl border border-slate-200 dark:border-darkborder max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">Connections</h2>
                <button onclick="toggleModal('settingsModal')" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full"><i data-lucide="x"></i></button>
            </div>

            <div class="bg-slate-50 dark:bg-slate-900/50 p-6 rounded-2xl mb-6 space-y-4 border border-slate-100 dark:border-slate-800">
                <h3 class="font-bold text-sm uppercase text-blue-500 flex items-center gap-2"><i data-lucide="brain"></i> LLM Engine</h3>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="modelName" class="w-full border dark:border-darkborder dark:bg-slate-800 p-3 rounded-xl text-sm" placeholder="Model name">
                    <input type="text" id="apiUrl" class="w-full border dark:border-darkborder dark:bg-slate-800 p-3 rounded-xl text-sm" placeholder="API URL">
                </div>
                <input type="password" class="w-full border dark:border-darkborder dark:bg-slate-800 p-3 rounded-xl text-sm" placeholder="API Key">
                <button onclick="testConn('llm')" id="test-llm" class="w-full py-3 bg-white dark:bg-slate-800 border dark:border-darkborder text-xs font-bold rounded-xl flex items-center justify-center gap-2 hover:border-blue-500 transition-all">
                    Test LLM Engine
                </button>
            </div>

            <div class="bg-slate-50 dark:bg-slate-900/50 p-6 rounded-2xl space-y-4 border border-slate-100 dark:border-slate-800">
                <h3 class="font-bold text-sm uppercase text-indigo-500 flex items-center gap-2"><i data-lucide="trello"></i> Jira Cloud</h3>
                <input type="text" id="jiraDomain" class="w-full border dark:border-darkborder dark:bg-slate-800 p-3 rounded-xl text-sm" placeholder="Instance URL (e.g., dev.atlassian.net)">
                <div class="grid grid-cols-2 gap-4">
                    <input type="email" class="w-full border dark:border-darkborder dark:bg-slate-800 p-3 rounded-xl text-sm" placeholder="Email Account">
                    <input type="password" class="w-full border dark:border-darkborder dark:bg-slate-800 p-3 rounded-xl text-sm" placeholder="Jira API Token">
                </div>
                <button onclick="testConn('jira')" id="test-jira" class="w-full py-3 bg-white dark:bg-slate-800 border dark:border-darkborder text-xs font-bold rounded-xl flex items-center justify-center gap-2 hover:border-indigo-500 transition-all">
                    Test Jira Cloud API
                </button>
            </div>

            <button onclick="toggleModal('settingsModal')" class="w-full mt-6 py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-xl">Close</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Theme Switch
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcons(isDark);
        }

        function updateIcons(isDark) {
            document.getElementById('sunIcon').classList.toggle('hidden', !isDark);
            document.getElementById('moonIcon').classList.toggle('hidden', isDark);
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
            updateIcons(true);
        }

        // Variable to hold the fetched Jira Context separately from generated output
        let currentJiraContext = "";

        // Toggles views between basic text and Jira hybrid
        function toggleSourceFields(source) {
            const jiraField = document.getElementById('jiraInputField');
            const textAreaLabel = document.getElementById('textAreaLabel');
            const outputLabel = document.getElementById('outputLabel');
            const placeholder = document.getElementById('placeholder');
            const content = document.getElementById('actualContent');

            // Reset Output when switching between profiles
            placeholder.classList.remove('hidden');
            content.innerText = "";
            currentJiraContext = "";

            if (source === 'jira') {
                jiraField.classList.remove('hidden');
                textAreaLabel.innerText = "Additional Notes/Clarification Context";
                outputLabel.firstChild.textContent = "Live Ticket Preview ";
            } else {
                jiraField.classList.add('hidden');
                textAreaLabel.innerText = "Requirements Details";
                outputLabel.firstChild.textContent = "Generated Output ";
            }
        }

        // Automatically load ticket details upon entering a key and clicking outside the field
        async function simulateJiraFetch() {
            const key = document.getElementById('jiraKey').value.trim();
            const fetchStatus = document.getElementById('jiraFetchStatus');
            const placeholder = document.getElementById('placeholder');
            const content = document.getElementById('actualContent');

            if(!key) return;

            fetchStatus.classList.remove('hidden');
            await new Promise(r => setTimeout(r, 1500)); // Simulate loading delay
            fetchStatus.classList.add('hidden');

            placeholder.classList.add('hidden');

            // Store this as our context (to display as preview, which then clears out on Generate)
            currentJiraContext = `--- JIRA TICKET FETCHED [${key}] ---\n\n` +
                                 `Subject: Validate Shopping Cart Integration in API payloads.\n` +
                                 `Reporter: Jagadishwar Reddy\n` +
                                 `Description:\nThe engineering team must implement synchronous cart handling. The payloads should include standard UUID and ISO timestamps without structural regressions. Validated over RESTful specifications.`;

            content.innerText = currentJiraContext;
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('active');
        }

        function updateFileCount() {
            const input = document.getElementById('fileInput');
            const status = document.getElementById('fileStatus');
            status.innerText = input.files.length > 0 ? `${input.files.length} items queued` : "Drop screenshots/logs here";
            if(input.files.length > 0) status.classList.add('text-blue-500', 'font-bold');
        }

        async function testConn(type) {
            const btn = document.getElementById(`test-${type}`);
            const original = btn.innerText;
            btn.innerHTML = `<span class="animate-spin border-2 border-slate-400 border-t-transparent rounded-full w-4 h-4 mr-2"></span> Checking...`;
            await new Promise(r => setTimeout(r, 1200));
            btn.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4 text-green-500 mr-2"></i> Connected`;
            lucide.createIcons();
            setTimeout(() => { btn.innerText = original; }, 3000);
        }

        // When generate runs, the Jira ticket preview wipes and the final LLM output is loaded
        function generate() {
            const content = document.getElementById('actualContent');
            const status = document.getElementById('genStatus');
            const outputLabel = document.getElementById('outputLabel');
            const textVal = document.getElementById('inputText').value;

            document.getElementById('placeholder').classList.add('hidden');
            
            // Clear out ticket preview 
            content.innerText = "";
            outputLabel.firstChild.textContent = "Generated Output "; // Reset Label to standard output

            status.classList.remove('hidden');

            setTimeout(() => {
                status.classList.add('hidden');
                
                // Final generated output replacing the preview
                content.innerText = `--- GENERATED TEST PLAN / STRATEGY ---\n\n` +
                                    `Target Artifacts: Test Cases and Coverage matrices.\n\n` +
                                    `1. Context Intake Verification: Authenticate valid headers & request parameters.\n` +
                                    `2. Edge Scenarios Processing: Null bounds, empty lists, schema validation constraints.\n` +
                                    `3. Integration Cycle: Confirm data propagation over internal hooks.\n\n` +
                                    `Hybrid Context Incorporated: ${textVal ? textVal.substring(0, 30) + '...' : 'System default'}`;
            }, 1800);
        }

        function download() {
            const content = document.getElementById('actualContent').innerText;
            if(!content) return alert("Nothing to download!");
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Generated_Plan_${Date.now()}.txt`;
            a.click();
        }
    </script>
</body>
</html>
